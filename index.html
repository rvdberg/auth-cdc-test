<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAP CDC Proxy Login</title>

    <!-- SAP CDC SDK -->
    <script
        src="https://cdns.eu1.gigya.com/js/gigya.js?apiKey=4_bA6gSzW_ffYlmdLnvdY36g"
        type="text/javascript">
    </script>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-box {
            background: white;
            padding: 30px;
            border-radius: 6px;
            box-shadow: 0 2px 8px rgba(0,0,0,.15);
            width: 320px;
        }

        h2 {
            margin-top: 0;
            text-align: center;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-bottom: 12px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 10px;
            cursor: pointer;
        }

        #message {
            margin-top: 15px;
            color: red;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="login-box">
    <h2>Login</h2>

    <input
        type="email"
        id="email"
        placeholder="Email">

    <input
        type="password"
        id="password"
        placeholder="Password">

    <button onclick="login()">Login</button>

    <div id="message"></div>
</div>

<script>
function login() {

    document.getElementById("message").innerHTML = "";

    gigya.accounts.login({
        loginID: document.getElementById("email").value,
        password: document.getElementById("password").value,

        callback: function(response) {

            if (response.errorCode === 0) {

                console.log("Logged in", response);

                document.getElementById("message").style.color = "green";
                document.getElementById("message").innerHTML = "Login successful";

                // JWT / session information
                console.log("UID:", response.UID);
                console.log("Session:", response.sessionInfo);

                // Redirect if desired
                // window.location.href = "/";

            } else {

                console.error(response);

                document.getElementById("message").style.color = "red";
                document.getElementById("message").innerHTML =
                    response.errorMessage;
            }
        }
    });
}
</script>

</body>
</html>
