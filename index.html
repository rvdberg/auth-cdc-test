<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Inloggen</title>

<script src="https://cdns.eu1.gigya.com/js/gigya.oidc.js?apiKey=4_bA6gSzW_ffYlmdLnvdY36g"></script>

<style>
*{
    box-sizing:border-box;
}

body{
    margin:0;
    font-family:Arial,Helvetica,sans-serif;
    background:#f5f7f5;
    color:#222;
}

.wrapper{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:40px 20px;
}

.login-card{
    width:420px;
    background:#fff;
    border-radius:12px;
    box-shadow:0 4px 18px rgba(0,0,0,.08);
    padding:40px;
}

.logo{
    text-align:center;
    margin-bottom:32px;
}

.logo img{
    height:42px;
}

h1{
    font-size:30px;
    font-weight:400;
    margin:0 0 30px;
}

label{
    display:block;
    font-size:14px;
    margin-bottom:8px;
    font-weight:600;
}

input{
    width:100%;
    padding:14px 16px;
    font-size:16px;
    border:1px solid #C8D0C8;
    border-radius:6px;
    margin-bottom:20px;
    transition:.2s;
}

input:focus{
    outline:none;
    border-color:#00A651;
    box-shadow:0 0 0 3px rgba(0,166,81,.15);
}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:6px;
    background:#00A651;
    color:white;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
    transition:.2s;
}

button:hover{
    background:#008d46;
}

.links{
    display:flex;
    justify-content:space-between;
    margin-top:24px;
    font-size:14px;
}

.links a{
    color:#00753B;
    text-decoration:none;
}

.links a:hover{
    text-decoration:underline;
}

#message{
    margin-top:20px;
    text-align:center;
    font-size:14px;
}

.success{
    color:#00753B;
}

.error{
    color:#C62828;
}
</style>

</head>
<body>

<div class="wrapper">

    <div class="login-card">

        <div class="logo">
            <!-- Replace with your own logo -->
            <img src="logo.svg" alt="Logo">
        </div>

        <h1>Inloggen</h1>

        <label for="email">E-mailadres</label>
        <input id="email" type="email">

        <label for="password">Wachtwoord</label>
        <input id="password" type="password">

        <button onclick="login()">
            Inloggen
        </button>

        <div id="message"></div>

        <div class="links">
            <a href="#">Nog geen account?</a>
            <a href="#">Wachtwoord vergeten</a>
        </div>

    </div>

</div>

<script>

function login(){

    const msg=document.getElementById("message");
    msg.className="";
    msg.innerHTML="";

    gigya.accounts.login({

        loginID:document.getElementById("email").value,

        password:document.getElementById("password").value,

        callback:function(response){

            if(response.errorCode===0){

                msg.className="success";
                msg.innerHTML="Succesvol ingelogd.";

                console.log(response);

                // Example:
                // fetch('/proxy-login', { ... });

            }else{

                msg.className="error";
                msg.innerHTML=response.errorMessage;

            }

        }

    });

}

</script>

</body>
</html>
